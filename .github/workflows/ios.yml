name: iOS Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify CocoaPods
        run: pod --version

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Resolve Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE_PATH="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          PROJECT_PATH="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"

          if [ -z "$WORKSPACE_PATH" ] || [ -z "$PROJECT_PATH" ]; then
            echo "::error::Unable to find the generated iOS workspace/project."
            exit 1
          fi

          SCHEME="$(xcodebuild -list -json -project "$PROJECT_PATH" | python3 -c "import json,sys; schemes=json.load(sys.stdin).get('project',{}).get('schemes',[]); preferred=[s for s in schemes if not s.startswith('Pods-') and not s.endswith('Tests') and not s.endswith('UITests')]; print((preferred or schemes)[0] if (preferred or schemes) else '')")"

          if [ -z "$SCHEME" ]; then
            echo "::error::Unable to resolve an application scheme from $PROJECT_PATH."
            xcodebuild -list -project "$PROJECT_PATH"
            exit 1
          fi

          echo "workspace=$WORKSPACE_PATH" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build iOS app without codesign
        run: |
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: List generated app bundles
        run: find build/ios -type d -name '*.app' | sort

      - name: Package IPA
        run: |
          APP_PATH="$(find build/ios -type d -name '*.app' | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle was produced by xcodebuild."
            find build/ios -maxdepth 6 -type d | sort
            exit 1
          fi

          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry NeonBeat.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: neon-beat-ios
          path: build/ios/ipa/NeonBeat.ipa
